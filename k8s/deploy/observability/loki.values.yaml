write:
  replicas: 1
read:
  replicas: 1
backend:
  replicas: 1

loki:
  commonConfig:
    replication_factor: 1
  auth_enabled: false

  # ✅ Thêm schema_config — bắt buộc phải có
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  # ✅ Thêm storage_config cho filesystem
  storage_config:
    tsdb_shipper:
      active_index_directory: /var/loki/index
      cache_location: /var/loki/index_cache
    filesystem:
      directory: /var/loki/chunks

storage:
  type: filesystem

test:
  enabled: false

minio:
  enabled: false  # ✅ tắt minio vì dùng filesystem, không cần thiết

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false